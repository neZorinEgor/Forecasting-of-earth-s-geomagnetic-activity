services:
  postgres:
    image: postgres:15
    container_name: postgres
    user: postgres
    ports:
      - 5432:5432      
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres  
      POSTGRES_DB: database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d", "database"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s
    # volumes:
    #   - postgres_data:/var/lib/postgresql/data
